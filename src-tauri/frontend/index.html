<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Box</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @font-face{font-family:'Inter';src:local('Inter'),local('PingFang SC'),local('Microsoft YaHei'),local('Segoe UI');font-display:swap}
  :root{
    --bg-primary:#0f0f1a;
    --bg-secondary:#1a1a2e;
    --bg-card:#16213e;
    --bg-input:#0d1b2a;
    --accent:#9c27b0;
    --accent-light:#e040fb;
    --accent-glow:rgba(224,64,251,0.3);
    --text-primary:#e0e0e0;
    --text-secondary:#8a8a9a;
    --text-muted:#555568;
    --border:#2a2a3e;
    --danger:#f44336;
    --success:#4caf50;
    --warning:#ff9800;
    --radius:8px;
    --radius-lg:12px;
    --shadow:0 8px 32px rgba(0,0,0,0.4);
    --transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  html,body{
    width:800px;height:500px;overflow:hidden;
    font-family:'Inter','PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
    background:var(--bg-primary);color:var(--text-primary);
    user-select:none;-webkit-user-select:none;
  }

  /* ===== Background ===== */
  .bg-layer{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at 20% 50%,rgba(156,39,176,0.15) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 20%,rgba(224,64,251,0.08) 0%,transparent 50%),
      radial-gradient(ellipse at 50% 80%,rgba(63,81,181,0.1) 0%,transparent 50%),
      linear-gradient(180deg,#0f0f1a 0%,#1a1a2e 50%,#0f0f1a 100%);
  }
  .bg-layer::before{
    content:'';position:absolute;inset:0;
    background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0v40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/></pattern></defs><rect fill="url(%23g)" width="200" height="200"/></svg>');
    opacity:0.5;
  }
  .bg-particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .particle{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle,var(--accent-light),transparent);
    opacity:0;animation:float-particle linear infinite;
  }
  @keyframes float-particle{
    0%{transform:translateY(100%) scale(0);opacity:0}
    10%{opacity:0.6}
    90%{opacity:0.6}
    100%{transform:translateY(-100vh) scale(1);opacity:0}
  }

  /* ===== Custom Title Bar ===== */
  .titlebar{
    position:relative;z-index:100;
    display:flex;align-items:center;gap:8px;
    height:42px;padding:0 8px 0 12px;
    background:linear-gradient(180deg,rgba(26,26,46,0.95),rgba(15,15,26,0.98));
    border-bottom:1px solid var(--border);
    -webkit-app-region:drag;app-region:drag;
  }
  .titlebar-input-group{
    display:flex;align-items:center;gap:6px;
    -webkit-app-region:no-drag;app-region:no-drag;
  }
  .titlebar-input{
    width:140px;height:28px;padding:0 10px;
    background:var(--bg-input);border:1px solid var(--border);
    border-radius:6px;color:var(--text-primary);font-size:12px;
    outline:none;transition:var(--transition);
  }
  .titlebar-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
  .titlebar-input::placeholder{color:var(--text-muted)}

  .btn-tb{
    height:28px;padding:0 12px;border:none;border-radius:6px;
    font-size:12px;font-weight:500;cursor:pointer;
    transition:var(--transition);display:flex;align-items:center;gap:4px;
    -webkit-app-region:no-drag;app-region:no-drag;
  }
  .btn-wipe{background:#2a1a1a;color:var(--danger);border:1px solid rgba(244,67,54,0.3)}
  .btn-wipe:hover{background:rgba(244,67,54,0.15);border-color:var(--danger)}
  .btn-add{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff}
  .btn-add:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .btn-add:active{transform:translateY(0)}

  .titlebar-spacer{flex:1}
  .titlebar-controls{
    display:flex;align-items:center;gap:2px;
    -webkit-app-region:no-drag;app-region:no-drag;
  }
  .tb-ctrl{
    width:32px;height:28px;border:none;background:transparent;
    color:var(--text-secondary);cursor:pointer;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transition:var(--transition);font-size:16px;
  }
  .tb-ctrl:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}
  .tb-ctrl.close:hover{background:var(--danger);color:#fff}
  .tb-ctrl svg{width:16px;height:16px;fill:currentColor}

  /* ===== Views ===== */
  .view{
    position:absolute;inset:42px 0 0 0;z-index:10;
    display:none;flex-direction:column;
    animation:fadeIn 0.3s ease;
  }
  .view.active{display:flex}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ===== Login View ===== */
  .login-view{align-items:center;justify-content:center;padding:20px}
  .login-card{
    width:380px;padding:36px 32px;
    background:linear-gradient(145deg,rgba(26,26,46,0.9),rgba(22,33,62,0.9));
    border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:var(--shadow),0 0 60px rgba(156,39,176,0.08);
    backdrop-filter:blur(20px);text-align:center;
  }
  .login-logo{
    width:64px;height:64px;margin:0 auto 16px;
    background:linear-gradient(135deg,var(--accent),var(--accent-light));
    border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:28px;box-shadow:0 4px 20px var(--accent-glow);
  }
  .login-title{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
  .login-subtitle{font-size:12px;color:var(--text-muted);margin-bottom:28px}
  .login-field{margin-bottom:16px;text-align:left}
  .login-label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:6px;letter-spacing:0.5px}
  .login-input{
    width:100%;height:40px;padding:0 14px;
    background:var(--bg-input);border:1px solid var(--border);
    border-radius:var(--radius);color:var(--text-primary);font-size:13px;
    outline:none;transition:var(--transition);
  }
  .login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .login-input::placeholder{color:var(--text-muted)}
  .login-input.readonly{
    background:rgba(13,27,42,0.5);color:var(--text-muted);
    font-family:'Courier New',monospace;font-size:11px;cursor:default;
  }
  .login-btn{
    width:100%;height:42px;margin-top:8px;border:none;border-radius:var(--radius);
    background:linear-gradient(135deg,var(--accent),var(--accent-light));
    color:#fff;font-size:14px;font-weight:600;cursor:pointer;
    transition:var(--transition);letter-spacing:1px;
    position:relative;overflow:hidden;
  }
  .login-btn:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
  .login-btn:active{transform:translateY(0)}
  .login-btn::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    transform:translateX(-100%);transition:transform 0.6s;
  }
  .login-btn:hover::after{transform:translateX(100%)}
  .login-footer{margin-top:20px;font-size:11px;color:var(--text-muted)}
  .login-footer a{color:var(--accent-light);text-decoration:none;cursor:pointer}
  .login-footer a:hover{text-decoration:underline}

  /* ===== Main View ===== */
  .main-view{padding:0}
  .main-content{flex:1;display:flex;flex-direction:column;padding:20px 24px 16px;overflow:hidden}

  /* Header */
  .main-header{text-align:center;margin-bottom:16px}
  .main-title{
    font-size:28px;font-weight:800;letter-spacing:4px;
    background:linear-gradient(135deg,#fff 0%,var(--accent-light) 50%,var(--accent) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;text-shadow:none;
    filter:drop-shadow(0 2px 8px var(--accent-glow));
  }
  .membership-badge{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:8px;padding:4px 14px;
    background:rgba(156,39,176,0.12);border:1px solid rgba(156,39,176,0.25);
    border-radius:20px;font-size:12px;color:var(--accent-light);
  }
  .membership-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* Status Box */
  .status-box{
    flex:1;min-height:0;margin-bottom:14px;padding:14px 16px;
    background:rgba(13,27,42,0.6);border:1px solid var(--border);
    border-radius:var(--radius);overflow-y:auto;
    font-family:'Courier New',monospace;font-size:12px;line-height:1.8;
    color:var(--text-secondary);
  }
  .status-box::-webkit-scrollbar{width:4px}
  .status-box::-webkit-scrollbar-track{background:transparent}
  .status-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .status-line{display:flex;align-items:flex-start;gap:8px}
  .status-line .time{color:var(--text-muted);flex-shrink:0}
  .status-line .msg{color:var(--text-secondary)}
  .status-line .msg.ok{color:var(--success)}
  .status-line .msg.err{color:var(--danger)}
  .status-line .msg.info{color:var(--accent-light)}

  /* Progress Bar */
  .progress-wrap{margin-bottom:16px}
  .progress-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:var(--text-muted)}
  .progress-track{
    height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%;border-radius:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent-light),#e91e63);
    background-size:200% 100%;
    animation:shimmer 2s linear infinite;
    transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
    position:relative;
  }
  .progress-fill::after{
    content:'';position:absolute;right:0;top:-1px;bottom:-1px;width:20px;
    background:radial-gradient(circle at right,rgba(224,64,251,0.8),transparent);
    border-radius:50%;filter:blur(4px);
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Action Buttons */
  .actions{display:flex;gap:10px}
  .btn-action{
    flex:1;height:48px;border:none;border-radius:var(--radius);
    font-size:14px;font-weight:600;cursor:pointer;
    transition:var(--transition);position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:1px;
  }
  .btn-action svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
  .btn-action::before{
    content:'';position:absolute;inset:0;opacity:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
    transition:opacity 0.3s;
  }
  .btn-action:hover::before{opacity:1}
  .btn-action:active{transform:scale(0.98)}
  .btn-action:disabled{opacity:0.5;cursor:not-allowed;transform:none}

  .btn-unlock-all{
    background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;
    box-shadow:0 4px 16px var(--accent-glow);
  }
  .btn-unlock-all:hover{box-shadow:0 6px 24px rgba(224,64,251,0.4);transform:translateY(-2px)}

  .btn-unlock-single{
    background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;
    box-shadow:0 4px 16px rgba(33,150,243,0.2);
  }
  .btn-unlock-single:hover{box-shadow:0 6px 24px rgba(33,150,243,0.35);transform:translateY(-2px)}

  .btn-repair{
    background:linear-gradient(135deg,#2e7d32,#66bb6a);color:#fff;
    box-shadow:0 4px 16px rgba(76,175,80,0.2);
  }
  .btn-repair:hover{box-shadow:0 6px 24px rgba(76,175,80,0.35);transform:translateY(-2px)}

  /* ===== Settings Modal ===== */
  .modal-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;
    animation:fadeOverlay 0.2s ease;
  }
  .modal-overlay.active{display:flex}
  @keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
  .modal{
    width:420px;max-height:380px;padding:24px;
    background:linear-gradient(145deg,var(--bg-secondary),var(--bg-card));
    border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:var(--shadow);animation:modalIn 0.25s ease;
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .modal-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);
    font-size:13px;
  }
  .modal-row:last-child{border-bottom:none}
  .modal-row label{color:var(--text-secondary)}
  .toggle{
    width:40px;height:22px;border-radius:11px;
    background:var(--border);cursor:pointer;
    position:relative;transition:var(--transition);
  }
  .toggle.on{background:var(--accent)}
  .toggle::after{
    content:'';position:absolute;top:2px;left:2px;
    width:18px;height:18px;border-radius:50%;
    background:#fff;transition:var(--transition);
  }
  .toggle.on::after{left:20px}
  .modal-close{
    margin-top:16px;width:100%;height:36px;border:none;
    border-radius:var(--radius);background:var(--border);
    color:var(--text-primary);font-size:13px;cursor:pointer;
    transition:var(--transition);
  }
  .modal-close:hover{background:rgba(255,255,255,0.12)}

  /* ===== Toast ===== */
  .toast-container{position:fixed;top:52px;right:12px;z-index:300;display:flex;flex-direction:column;gap:6px}
  .toast{
    padding:10px 16px;border-radius:var(--radius);font-size:12px;
    background:var(--bg-card);border:1px solid var(--border);
    box-shadow:var(--shadow);animation:toastIn 0.3s ease;
    display:flex;align-items:center;gap:8px;max-width:280px;
  }
  .toast.success{border-left:3px solid var(--success)}
  .toast.error{border-left:3px solid var(--danger)}
  .toast.info{border-left:3px solid var(--accent-light)}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

  /* ===== Spinner ===== */
  .spinner{
    width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);
    border-top-color:#fff;border-radius:50%;
    animation:spin 0.6s linear infinite;display:none;
  }
  .spinner.active{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== Scrollbar Global ===== */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer"></div>
<div class="bg-particles" id="particles"></div>

<!-- Title Bar -->
<div class="titlebar">
  <div class="titlebar-input-group">
    <input type="text" class="titlebar-input" id="appIdInput" placeholder="AppID" spellcheck="false" autocomplete="off">
    <button class="btn-tb btn-wipe" onclick="handleWipe()" title="擦除游戏">
      <svg viewBox="0 0 20 20" width="12" height="12" fill="currentColor"><path d="M6 4V3a1 1 0 011-1h6a1 1 0 011 1v1h4a1 1 0 110 2h-1v10a2 2 0 01-2 2H5a2 2 0 01-2-2V6H2a1 1 0 110-2h4zm2 0h4V3H8v1zM5 6v10h10V6H5zm3 2a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z"/></svg>
      擦除
    </button>
    <button class="btn-tb btn-add" onclick="handleAddSingle()" title="入库游戏">
      <svg viewBox="0 0 20 20" width="12" height="12" fill="currentColor"><path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/></svg>
      入库
    </button>
  </div>
  <div class="titlebar-spacer"></div>
  <div class="titlebar-controls">
    <button class="tb-ctrl" onclick="toggleSettings()" title="设置">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
    </button>
    <button class="tb-ctrl" onclick="minimizeWindow()" title="最小化">
      <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
    </button>
    <button class="tb-ctrl close" onclick="closeWindow()" title="关闭">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
</div>

<!-- LOGIN VIEW -->
<div class="view login-view active" id="loginView">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" width="32" height="32" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <div class="login-title">STEAM BOX</div>
    <div class="login-subtitle">游戏入库工具 - 请激活您的CDK</div>

    <div class="login-field">
      <label class="login-label">CDK 激活码</label>
      <input type="text" class="login-input" id="cdkInput" placeholder="请输入CDK激活码" spellcheck="false" autocomplete="off">
    </div>
    <div class="login-field">
      <label class="login-label">机器码 (Machine Code)</label>
      <input type="text" class="login-input readonly" id="machineCode" readonly value="加载中...">
    </div>

    <button class="login-btn" onclick="handleActivate()" id="activateBtn">
      <span id="activateBtnText">激 活</span>
      <div class="spinner" id="activateSpinner"></div>
    </button>

    <div class="login-footer">
      激活遇到问题？<a onclick="copyMachineCode()">复制机器码</a> 联系客服
    </div>
  </div>
</div>

<!-- MAIN VIEW -->
<div class="view main-view" id="mainView">
  <div class="main-content">
    <div class="main-header">
      <div class="main-title">STEAM BOX</div>
      <div class="membership-badge">
        <span class="dot"></span>
        <span id="membershipExpiry">会员到期：2026-12-31</span>
      </div>
    </div>

    <div class="status-box" id="statusBox">
      <div class="status-line"><span class="time">[启动]</span><span class="msg info">同步最新Steam数据 每天持续更新中</span></div>
      <div class="status-line"><span class="time">[信息]</span><span class="msg ok">系统就绪 - 等待操作指令</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span id="progressLabel">就绪</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-action btn-unlock-all" onclick="handleUnlockAll()" id="btnUnlockAll">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
        一键入库
      </button>
      <button class="btn-action btn-unlock-single" onclick="handleUnlockSingleBtn()" id="btnUnlockSingle">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        单游入库
      </button>
      <button class="btn-action btn-repair" onclick="handleRepair()" id="btnRepair">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        修复
      </button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--accent-light)"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
      设置
    </div>
    <div class="modal-row">
      <label>自动同步数据</label>
      <div class="toggle on" onclick="this.classList.toggle('on')" data-key="autoSync"></div>
    </div>
    <div class="modal-row">
      <label>入库后通知</label>
      <div class="toggle on" onclick="this.classList.toggle('on')" data-key="notify"></div>
    </div>
    <div class="modal-row">
      <label>开机自启动</label>
      <div class="toggle" onclick="this.classList.toggle('on')" data-key="autoStart"></div>
    </div>
    <div class="modal-row">
      <label>静默模式</label>
      <div class="toggle" onclick="this.classList.toggle('on')" data-key="silent"></div>
    </div>
    <button class="modal-close" onclick="toggleSettings()">关闭</button>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* =======================================
   TAURI IPC BRIDGE
   ======================================= */
const invoke = (cmd, args = {}) => {
  if (window.__TAURI__ && window.__TAURI__.core) {
    return window.__TAURI__.core.invoke(cmd, args);
  }
  console.warn(`[DEV] invoke("${cmd}",`, args, ') - Tauri not available');
  return Promise.resolve(null);
};

/* =======================================
   STATE
   ======================================= */
let state = {
  isActivated: false,
  memberExpiry: '2026-12-31',
  machineCode: '',
  progress: 0,
  busy: false
};

/* =======================================
   PARTICLES
   ======================================= */
(function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*8+6}s;
      animation-delay:${Math.random()*8}s;
    `;
    c.appendChild(p);
  }
})();

/* =======================================
   VIEW MANAGEMENT
   ======================================= */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =======================================
   TOAST NOTIFICATIONS
   ======================================= */
function toast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {
    success: '✓',
    error: '✗',
    info: 'ⓘ'
  };
  t.innerHTML = `<span>${icons[type] || 'ⓘ'}</span><span>${message}</span>`;
  container.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

/* =======================================
   STATUS LOG
   ======================================= */
function logStatus(msg, level = 'info') {
  const box = document.getElementById('statusBox');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const cls = level === 'ok' ? 'ok' : level === 'err' ? 'err' : 'info';
  const line = document.createElement('div');
  line.className = 'status-line';
  line.innerHTML = `<span class="time">[${ts}]</span><span class="msg ${cls}">${msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

/* =======================================
   PROGRESS BAR
   ======================================= */
function setProgress(percent, label) {
  const fill = document.getElementById('progressFill');
  const lbl = document.getElementById('progressLabel');
  const pct = document.getElementById('progressPercent');
  state.progress = Math.min(100, Math.max(0, percent));
  fill.style.width = state.progress + '%';
  pct.textContent = Math.round(state.progress) + '%';
  if (label) lbl.textContent = label;
}

/* =======================================
   CORE FUNCTIONS
   ======================================= */

// Activate CDK
async function activateCDK(cdk) {
  if (!cdk || cdk.trim() === '') {
    toast('请输入CDK激活码', 'error');
    return;
  }
  try {
    const result = await invoke('activate_cdk', {
      cdk: cdk.trim(),
      machineCode: state.machineCode
    });
    if (result && result.success) {
      state.isActivated = true;
      state.memberExpiry = result.expiry || '2026-12-31';
      document.getElementById('membershipExpiry').textContent = '会员到期：' + state.memberExpiry;
      toast('激活成功！', 'success');
      showView('mainView');
      logStatus('CDK激活成功 - 欢迎使用Steam Box', 'ok');
      logStatus('同步最新Steam数据 每天持续更新中', 'info');
    } else {
      toast(result?.message || '激活失败，请检查CDK', 'error');
    }
    return result;
  } catch (e) {
    toast('激活失败: ' + (e.message || e), 'error');
    throw e;
  }
}

// Unlock All Games
async function unlockAll() {
  if (state.busy) return;
  state.busy = true;
  const btn = document.getElementById('btnUnlockAll');
  btn.disabled = true;
  logStatus('开始一键入库...', 'info');
  setProgress(0, '入库中...');
  try {
    const result = await invoke('unlock_all', {});
    if (result && result.total) {
      logStatus(`入库完成: 共 ${result.total} 个游戏`, 'ok');
      setProgress(100, '入库完成');
      toast(`成功入库 ${result.total} 个游戏`, 'success');
    }
    return result;
  } catch (e) {
    logStatus('一键入库失败: ' + (e.message || e), 'err');
    toast('入库失败', 'error');
    setProgress(0, '入库失败');
    throw e;
  } finally {
    state.busy = false;
    btn.disabled = false;
  }
}

// Unlock Single Game
async function unlockSingle(appid) {
  if (!appid) {
    toast('请输入AppID', 'error');
    return;
  }
  if (state.busy) return;
  state.busy = true;
  logStatus(`入库游戏: AppID ${appid}`, 'info');
  setProgress(30, '入库中...');
  try {
    const result = await invoke('unlock_single', { appid: String(appid) });
    if (result && result.success) {
      logStatus(`游戏 ${appid} (${result.name || '未知'}) 入库成功`, 'ok');
      setProgress(100, '入库完成');
      toast(`${result.name || 'AppID ' + appid} 入库成功`, 'success');
    } else {
      logStatus(`游戏 ${appid} 入库失败: ${result?.message || '未知错误'}`, 'err');
      toast(result?.message || '入库失败', 'error');
      setProgress(0, '入库失败');
    }
    return result;
  } catch (e) {
    logStatus(`入库失败: ${e.message || e}`, 'err');
    toast('入库失败', 'error');
    setProgress(0, '入库失败');
    throw e;
  } finally {
    state.busy = false;
  }
}

// Repair
async function repair() {
  if (state.busy) return;
  state.busy = true;
  const btn = document.getElementById('btnRepair');
  btn.disabled = true;
  logStatus('开始修复...', 'info');
  setProgress(0, '修复中...');
  try {
    const result = await invoke('repair', {});
    logStatus('修复完成', 'ok');
    setProgress(100, '修复完成');
    toast('修复成功', 'success');
    return result;
  } catch (e) {
    logStatus('修复失败: ' + (e.message || e), 'err');
    toast('修复失败', 'error');
    setProgress(0, '修复失败');
    throw e;
  } finally {
    state.busy = false;
    btn.disabled = false;
  }
}

// Wipe Game
async function wipeGame(appid) {
  if (!appid) {
    toast('请输入AppID', 'error');
    return;
  }
  if (state.busy) return;
  state.busy = true;
  logStatus(`擦除游戏: AppID ${appid}`, 'info');
  try {
    const result = await invoke('wipe_game', { appid: String(appid) });
    if (result && result.success) {
      logStatus(`游戏 ${appid} 已擦除`, 'ok');
      toast('擦除成功', 'success');
    } else {
      logStatus(`擦除失败: ${result?.message || '未知错误'}`, 'err');
      toast('擦除失败', 'error');
    }
    return result;
  } catch (e) {
    logStatus('擦除失败: ' + (e.message || e), 'err');
    toast('擦除失败', 'error');
    throw e;
  } finally {
    state.busy = false;
  }
}

/* =======================================
   UI HANDLERS
   ======================================= */
async function handleActivate() {
  const btn = document.getElementById('activateBtn');
  const spinner = document.getElementById('activateSpinner');
  const btnText = document.getElementById('activateBtnText');
  const cdk = document.getElementById('cdkInput').value;

  btn.disabled = true;
  spinner.classList.add('active');
  btnText.textContent = '验证中...';

  try {
    await activateCDK(cdk);
  } catch (e) {
    // handled in activateCDK
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
    btnText.textContent = '激 活';
  }
}

function handleUnlockAll() {
  unlockAll();
}

function handleUnlockSingleBtn() {
  const appid = document.getElementById('appIdInput').value.trim();
  if (!appid) {
    toast('请先在顶部输入AppID', 'error');
    document.getElementById('appIdInput').focus();
    return;
  }
  unlockSingle(appid);
}

function handleRepair() {
  repair();
}

function handleWipe() {
  const appid = document.getElementById('appIdInput').value.trim();
  if (!appid) {
    toast('请先输入要擦除的AppID', 'error');
    document.getElementById('appIdInput').focus();
    return;
  }
  wipeGame(appid);
}

function handleAddSingle() {
  const appid = document.getElementById('appIdInput').value.trim();
  if (!appid) {
    toast('请先输入AppID', 'error');
    document.getElementById('appIdInput').focus();
    return;
  }
  unlockSingle(appid);
}

function copyMachineCode() {
  const code = document.getElementById('machineCode').value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => toast('机器码已复制', 'success'));
  } else {
    const el = document.getElementById('machineCode');
    el.select();
    document.execCommand('copy');
    toast('机器码已复制', 'success');
  }
}

/* =======================================
   SETTINGS
   ======================================= */
function toggleSettings() {
  const modal = document.getElementById('settingsModal');
  modal.classList.toggle('active');
}
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) toggleSettings();
});

/* =======================================
   WINDOW CONTROLS (Tauri)
   ======================================= */
async function minimizeWindow() {
  try {
    if (window.__TAURI__ && window.__TAURI__.window) {
      const appWindow = window.__TAURI__.window.getCurrentWindow();
      await appWindow.minimize();
    }
  } catch (e) {
    console.warn('minimize failed:', e);
  }
}

async function closeWindow() {
  try {
    if (window.__TAURI__ && window.__TAURI__.window) {
      const appWindow = window.__TAURI__.window.getCurrentWindow();
      await appWindow.close();
    } else {
      window.close();
    }
  } catch (e) {
    window.close();
  }
}

/* =======================================
   INIT
   ======================================= */
async function init() {
  // Get machine code
  try {
    const mc = await invoke('get_machine_code', {});
    if (mc) {
      state.machineCode = mc;
      document.getElementById('machineCode').value = mc;
    } else {
      // Fallback: generate a pseudo machine code for display
      state.machineCode = 'XXXX-' + Math.random().toString(36).substr(2,8).toUpperCase();
      document.getElementById('machineCode').value = state.machineCode;
    }
  } catch (e) {
    state.machineCode = 'LOAD-ERROR';
    document.getElementById('machineCode').value = state.machineCode;
  }

  // Check existing activation
  try {
    const session = await invoke('check_session', {});
    if (session && session.active) {
      state.isActivated = true;
      state.memberExpiry = session.expiry || '2026-12-31';
      document.getElementById('membershipExpiry').textContent = '会员到期：' + state.memberExpiry;
      showView('mainView');
      logStatus('会话恢复成功', 'ok');
      logStatus('同步最新Steam数据 每天持续更新中', 'info');
    }
  } catch (e) {
    // Stay on login
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('settingsModal');
    if (modal.classList.contains('active')) toggleSettings();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('loginView').classList.contains('active')) {
      handleActivate();
    } else if (document.activeElement === document.getElementById('appIdInput')) {
      handleAddSingle();
    }
  }
});

// Prevent text selection on double-click in titlebar
document.querySelector('.titlebar').addEventListener('mousedown', (e) => {
  if (e.detail > 1) e.preventDefault();
});

// Initialize
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
