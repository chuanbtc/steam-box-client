name: Build Windows Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: x64
          - target: aarch64-pc-windows-msvc
            name: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Build with Tauri
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.target }} --bundles none
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Find and upload exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/${{ matrix.target }}/release -Filter "*.exe" | Where-Object { $_.Name -notmatch "build|deps" -and $_.Length -gt 1000000 } | Select-Object -First 1
          Write-Host "Found: $($exe.FullName) ($($exe.Length) bytes)"
          Copy-Item $exe.FullName "steam-box-${{ matrix.name }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-box-${{ matrix.name }}
          path: steam-box-${{ matrix.name }}.exe
          retention-days: 30
